<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 400px; box-sizing: border-box; }
        h2 { text-align: center; margin-top: 0; color: #fff; }
        label { display: block; margin: 12px 0 6px; font-weight: 600; font-size: 14px; color: #aaa; }
        input, select { width: 100%; padding: 10px; background: #2a2a2a; border: 1px solid #444; border-radius: 6px; color: #fff; box-sizing: border-box; font-size: 15px; }
        input:focus, select:focus { border-color: #00adb5; outline: none; }
        button { width: 100%; padding: 12px; margin-top: 15px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-scan { background: #00adb5; color: #fff; }
        .btn-scan:disabled { background: #444; color: #888; cursor: not-allowed; }
        .btn-sync { background: #28a745; color: #fff; }
        #reader { width: 100%; margin-top: 15px; border-radius: 8px; overflow: hidden; display: none; }
        .status { margin-top: 15px; padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; display: none; word-wrap: break-word; }
        .status.success { background: rgba(40, 167, 69, 0.2); color: #28a745; border: 1px solid #28a745; }
        .status.error { background: rgba(220, 53, 69, 0.2); color: #dc3545; border: 1px solid #dc3545; }
    </style>
</head>
<body>

<div class="card">
    <h2>Student Portal</h2>
    <div id="setupAlert" class="status error" style="display:none; margin-bottom:15px;"></div>
    
    <label for="dept">Department</label>
    <select id="dept">
        <option value="IT">Information Technology (IT)</option>
        <option value="CE">Computer Engineering (CE)</option>
        <option value="CSE">Computer Science & Eng. (CSE)</option>
        <option value="ICT">ICT</option>
    </select>

    <label for="semester">Semester</label>
    <select id="semester">
        <option value="Sem 1">Semester 1</option>
        <option value="Sem 2">Semester 2</option>
        <option value="Sem 3">Semester 3</option>
        <option value="Sem 4">Semester 4</option>
        <option value="Sem 5" selected>Semester 5</option>
        <option value="Sem 6">Semester 6</option>
        <option value="Sem 7">Semester 7</option>
        <option value="Sem 8">Semester 8</option>
    </select>

    <label for="enrollment">Enrollment / Roll Number</label>
    <input type="text" id="enrollment" placeholder="e.g., 24012021073" required>

    <button class="button btn-scan" id="scanBtn" onclick="startScanner()">📷 Scan Classroom QR</button>
    <div id="reader"></div>

    <div id="statusBox" class="status"></div>

    <button class="button btn-sync" id="syncBtn" style="display: none;" onclick="syncToCloud()">☁️ Sync Attendance to Cloud</button>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const GOOGLE_SCRIPT_URL = urlParams.get('rpc'); 

    let html5QrcodeScanner = null;

    if (!localStorage.getItem('device_fingerprint')) {
        localStorage.setItem('device_fingerprint', 'DEV-' + Math.random().toString(36).substring(2, 15));
    }
    const deviceId = localStorage.getItem('device_fingerprint');

    if (!GOOGLE_SCRIPT_URL) {
        const alertBox = document.getElementById('setupAlert');
        alertBox.innerText = "🛑 Configuration Mismatch: Missing active deployment target link parameter pointer.";
        alertBox.style.display = "block";
        document.getElementById('scanBtn').disabled = true;
    }

    window.addEventListener('load', () => {
        if (localStorage.getItem('buffered_token')) {
            document.getElementById('scanBtn').disabled = true;
            showStatus("✓ Saved Ticket Located! Tap below to sync your attendance whenever your network bars are strong.", "success");
            document.getElementById('syncBtn').style.display = 'block';
        }
    });

    function showStatus(text, type) {
        const box = document.getElementById('statusBox');
        box.innerText = text;
        box.className = `status ${type}`;
        box.style.display = 'block';
    }

    function startScanner() {
        document.getElementById('reader').style.display = 'block';
        html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    }

    function onScanSuccess(decodedText) {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.clear().catch(err => console.log(err));
        }
        document.getElementById('reader').style.display = 'none';

        try {
            const scannedUrl = new URL(decodedText);
            const extractedToken = scannedUrl.searchParams.get('token');
            const localScanTimestamp = Math.floor(Date.now() / 1000);

            if (extractedToken) {
                localStorage.setItem('buffered_token', extractedToken);
                localStorage.setItem('buffered_timestamp', localScanTimestamp);

                document.getElementById('scanBtn').disabled = true;
                showStatus("✓ Scan captured from projector and sealed locally! Tap sync whenever your network status is clear.", "success");
                document.getElementById('syncBtn').style.display = 'block';
            } else {
                showStatus("🛑 Read Error: Invalid QR Code profile format structure.", "error");
            }
        } catch (e) {
            showStatus("🛑 Format Exception: Please scan the live classroom projector screen directly.", "error");
        }
    }

    function onScanFailure(error) {}

    function syncToCloud() {
        const enrollment = document.getElementById('enrollment').value.trim();
        const dept = document.getElementById('dept').value;
        const sem = document.getElementById('semester').value;

        if (!enrollment) {
            alert("Please input your entry enrollment key first.");
            return;
        }

        const savedToken = localStorage.getItem('buffered_token');
        const savedTimestamp = localStorage.getItem('buffered_timestamp');

        if (!savedToken || !savedTimestamp) {
            showStatus("🛑 Buffer error: Token mismatch context variables. Try scanning again.", "error");
            return;
        }

        if (!navigator.onLine) {
            showStatus("🛑 Device Offline: Your token remains safely buffered locally, but full 5G/Wi-Fi bars are required to write data directly to Google Sheets!", "error");
            return;
        }

        showStatus("Transmitting attendance record to Google Cloud database sheets...", "success");

        const payload = {
            enrollment: enrollment,
            department: dept,
            semester: sem,
            token: savedToken,
            scanTime: savedTimestamp,
            deviceId: deviceId
        };

        const queryString = new URLSearchParams(payload).toString();

        fetch(GOOGLE_SCRIPT_URL + "?" + queryString, { method: 'GET' })
        .then(response => response.text())
        .then(responseText => {
            if (responseText.trim() === "SUCCESS") {
                showStatus("🎉 Attendance Successfully Logged into Matrix Sheet Columns!", "success");
                document.getElementById('syncBtn').style.display = 'none';
                
                localStorage.removeItem('buffered_token');
                localStorage.removeItem('buffered_timestamp');
                document.getElementById('scanBtn').disabled = false;
            } else {
                showStatus("🛑 Registration Denied: " + responseText, "error");
            }
        })
        .catch(err => {
            showStatus("Network socket timeout exception. Tap sync again.", "error");
            console.error(err);
        });
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Offline Engine Active:', reg.scope))
                .catch(err => console.log('Service Worker Failed:', err));
        });
    }
</script>
</body>
</html>
