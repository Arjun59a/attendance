<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Smart Attendance</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 20px; text-align: center; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: none; }
        .btn-scan { background: #00adb5; color: #fff; }
        .btn-sync { background: #28a745; color: #fff; }
    </style>
</head>
<body>
<div class="card">
    <h3>Attendance Portal</h3>
    <input type="text" id="enrollment" placeholder="Enrollment Number">
    <button class="btn-scan" onclick="startScanner()">📷 Scan QR</button>
    <div id="reader" style="display:none"></div>
    <button class="btn-sync" id="syncBtn" style="display:none" onclick="sync()">☁️ Sync to Cloud</button>
    <div id="status"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbys9GgaykhMsw0TGs-s76qv3_PtySkRnALWbZxNiXdO1cDEu1c0abp0hXQ96ZccQYOcmA/exec";
    
    // Auto-generate DeviceID if not exists
    if (!localStorage.getItem('dev_id')) localStorage.setItem('dev_id', 'D-' + Math.random().toString(36).substr(2, 9));

    function startScanner() {
        document.getElementById('reader').style.display = 'block';
        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (data) => {
            scanner.stop();
            const p = data.split('|');
            localStorage.setItem('t', p[0]); localStorage.setItem('s', p[2]);
            localStorage.setItem('e', p[3]); localStorage.setItem('r', p[4]);
            document.getElementById('syncBtn').style.display = 'block';
            document.getElementById('status').innerText = "✓ Captured! Sync now.";
        });
    }

    function sync() {
        const p = new URLSearchParams({
            enrollment: document.getElementById('enrollment').value,
            token: localStorage.getItem('t'), start: localStorage.getItem('s'),
            end: localStorage.getItem('e'), isRunning: localStorage.getItem('r'),
            deviceId: localStorage.getItem('dev_id')
        });
        fetch(SCRIPT_URL + "?" + p).then(r => r.text()).then(t => alert(t));
    }
</script>
</body>
</html>
