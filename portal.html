<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Attendance Portal</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 20px; display: flex; justify-content: center; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; width: 100%; max-width: 400px; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        .btn-scan { background: #00adb5; color: white; cursor: pointer; }
        .btn-sync { background: #28a745; color: white; cursor: pointer; }
    </style>
</head>
<body>
<div class="card">
    <h2>Student Portal</h2>
    <input type="text" id="enrollment" placeholder="Enrollment Number">
    <button class="btn-scan" id="scanBtn" onclick="startScanner()">📷 Scan QR</button>
    <div id="reader" style="display:none"></div>
    <button class="btn-sync" id="syncBtn" style="display:none" onclick="syncToCloud()">☁️ Sync Attendance</button>
    <div id="status"></div>
</div>

<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbybmhLi5kYtCGu87DBPFm0Cl2GxLCdkjDQt0HL5fIG1p6jRuW6V5ZMcfpbYKx6KQ2iwLw/exec";
    if (!localStorage.getItem('device_id')) localStorage.setItem('device_id', 'DEV-' + Math.random().toString(36).substr(2, 9));
    
    window.onload = () => {
        if (localStorage.getItem('submitted_today') === new Date().toDateString()) {
            document.getElementById('scanBtn').disabled = true;
            document.getElementById('status').innerText = "✅ Attendance already submitted today.";
        }
    };

    function startScanner() {
        document.getElementById('reader').style.display = 'block';
        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (data) => {
            scanner.stop();
            document.getElementById('reader').style.display = 'none';
            localStorage.setItem('buffered_token', data.split('|')[0]);
            localStorage.setItem('buffered_start', data.split('|')[2]);
            document.getElementById('syncBtn').style.display = 'block';
            document.getElementById('status').innerText = "✓ Scanned! Sync now.";
        });
    }

    function syncToCloud() {
        const payload = {
            enrollment: document.getElementById('enrollment').value,
            token: localStorage.getItem('buffered_token'),
            start: localStorage.getItem('buffered_start'),
            deviceId: localStorage.getItem('device_id')
        };
        fetch(GOOGLE_SCRIPT_URL + "?" + new URLSearchParams(payload))
        .then(res => res.text()).then(txt => {
            if (txt.includes("SUCCESS")) {
                localStorage.setItem('submitted_today', new Date().toDateString());
                alert("Logged!"); location.reload();
            } else { alert(txt); }
        });
    }
</script>
</body>
</html>
