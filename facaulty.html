<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Faculty Attendance</title>
<style>
body{margin:0;font-family:system-ui;background:#eef2f7;color:#172033}
main{max-width:480px;margin:auto;min-height:100vh;padding:18px;display:grid;place-items:center}
section{width:100%;background:white;border-radius:8px;padding:18px;box-shadow:0 16px 42px #0002}
h1{margin:0 0 12px} input,select,button{width:100%;box-sizing:border-box;font:inherit;margin-top:10px;padding:13px;border-radius:8px}
input,select{border:1px solid #cbd5e1} button{border:0;background:#166534;color:white;font-weight:800}
button.end{background:#991b1b}.status{margin-top:12px;padding:12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px}
</style>
</head>
<body>
<main><section>
<h1>Faculty Session</h1>
<input id="pin" placeholder="Faculty PIN">
<input id="sessionId" placeholder="Session ID" value="CLASS-01">
<input id="className" placeholder="Class" value="BCA-A">
<select id="lectureType">
<option value="Regular">Regular</option>
<option value="Proxy">Proxy</option>
</select>
<button onclick="startSession()">Start Session</button>
<button class="end" onclick="endSession()">End Session</button>
<div class="status" id="status">Ready.</div>
</section></main>

<script>
const APPS_SCRIPT_URL = "PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE";

function setStatus(msg){ status.textContent = msg; }

async function callServer(action) {
  if (APPS_SCRIPT_URL.includes("PASTE_YOUR")) return setStatus("Add Apps Script URL first.");

  const params = new URLSearchParams({
    action,
    facultyPin: pin.value.trim(),
    sessionId: sessionId.value.trim(),
    className: className.value.trim(),
    lectureType: lectureType.value
  });

  setStatus("Please wait...");

  try {
    const res = await fetch(APPS_SCRIPT_URL + "?" + params.toString());
    const json = await res.json();
    setStatus(json.message);
  } catch(e) {
    setStatus("Failed: " + e.message);
  }
}

function startSession(){ callServer("startSession"); }
function endSession(){ callServer("endSession"); }
</script>
</body>
</html>
