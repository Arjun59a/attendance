<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Faculty Session</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
body{margin:0;font-family:system-ui;background:#eef2f7;color:#172033}
main{max-width:480px;margin:auto;min-height:100vh;padding:18px;display:grid;place-items:center}
section{width:100%;background:white;border-radius:8px;padding:18px;box-shadow:0 16px 42px #0002}
h1{margin:0 0 12px}
select,button{width:100%;box-sizing:border-box;font:inherit;margin-top:10px;padding:13px;border-radius:8px}
select{border:1px solid #cbd5e1}
button{border:0;background:#166534;color:white;font-weight:800}
button.end{background:#991b1b}
button.logout{background:#334155}
button:disabled{opacity:.6}
.status{margin-top:12px;padding:12px;border-radius:8px;display:flex;align-items:center;gap:10px;background:#f8fafc;border:1px solid #e2e8f0}
.status.ok{background:#f0fdf4;border-color:#bbf7d0;color:#166534}
.status.err{background:#fef2f2;border-color:#fecaca;color:#991b1b}
.spinner{width:16px;height:16px;border:3px solid #cbd5e1;border-top-color:#166534;border-radius:50%;animation:spin .8s linear infinite;display:none;flex-shrink:0}
.status.loading .spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
#qrBox{background:white;padding:16px;border-radius:12px;display:flex;justify-content:center;margin-top:16px}
#qrInfo{text-align:center;font-size:1.1rem;margin-top:10px}
#qrInfo b{color:#166534}
.who{text-align:center;color:#64748b;font-size:.9rem;margin-top:-4px;margin-bottom:10px}
.small{font-size:.85rem;color:#64748b;margin-top:8px;text-align:center}
</style>
</head>
<body>
<main>
<section>
<h1>Faculty Session</h1>
<div class="who" id="whoami"></div>

<div id="selectView">
  <select id="assignmentSelect"></select>
  <button id="startBtn">Start Session</button>
</div>

<div id="qrView" style="display:none">
  <div id="qrBox"></div>
  <div id="qrInfo"></div>
  <button id="endBtn" class="end">End Session</button>
</div>

<div class="status" id="statusBox">
  <span class="spinner"></span>
  <span id="statusText">Loading your assigned classes...</span>
</div>

<div class="small" id="debugText"></div>
<button id="logoutBtn" class="logout">Logout</button>
</section>
</main>

<script>
const sessionRaw = sessionStorage.getItem("att_faculty_session");

if (!sessionRaw) {
  window.location.href = "login.html";
}

const mySession = JSON.parse(sessionRaw || "{}");
const apiUrl = mySession.apiUrl;
const username = mySession.username;
const token = mySession.token;

document.getElementById("whoami").textContent = "Logged in as: " + (username || "Unknown");

const statusBox = document.getElementById("statusBox");
const statusText = document.getElementById("statusText");
const debugText = document.getElementById("debugText");
const selectView = document.getElementById("selectView");
const qrView = document.getElementById("qrView");
const assignmentSelect = document.getElementById("assignmentSelect");
const startBtn = document.getElementById("startBtn");
const endBtn = document.getElementById("endBtn");
const logoutBtn = document.getElementById("logoutBtn");

let assignments = [];
let activeSessionId = "";
let pollTimer = null;
let lastPayload = "";

function setStatus(msg, kind, loading=false) {
  statusText.textContent = msg;
  statusBox.className = "status" + (kind ? " " + kind : "") + (loading ? " loading" : "");
}

function normalizeAssignment(a) {
  return {
    sessionId: String(
      a.sessionId ||
      a.sessionID ||
      a["sessionId"] ||
      a["Session ID"] ||
      a["session ID"] ||
      a["session id"] ||
      ""
    ).trim(),

    className: String(
      a.className ||
      a["className"] ||
      a["Class Name"] ||
      a["class name"] ||
      a["Class"] ||
      a.class ||
      ""
    ).trim(),

    lectureType: String(
      a.lectureType ||
      a["lectureType"] ||
      a["Lecture Type"] ||
      a["lecture type"] ||
      a.lecture ||
      "Regular"
    ).trim() || "Regular"
  };
}

async function loadAssignments() {
  setStatus("Loading your assigned classes...", "", true);
  debugText.textContent = "";

  if (!apiUrl || !username || !token) {
    setStatus("Login data missing. Please log in again.", "err");
    sessionStorage.removeItem("att_faculty_session");
    setTimeout(() => window.location.href = "login.html", 1500);
    return;
  }

  try {
    const params = new URLSearchParams({
      action: "getAssignments",
      username: username,
      token: token
    });

    const res = await fetch(apiUrl + "?" + params.toString());
    const data = await res.json();

    if (!data.ok) {
      setStatus(data.message || "Could not load assignments.", "err");
      if ((data.message || "").toLowerCase().includes("log in") ||
          (data.message || "").toLowerCase().includes("expired")) {
        sessionStorage.removeItem("att_faculty_session");
        setTimeout(() => window.location.href = "login.html", 1500);
      }
      return;
    }

    assignments = (data.assignments || [])
      .map(normalizeAssignment)
      .filter(a => a.sessionId && a.className);

    assignmentSelect.innerHTML = "";

    if (!assignments.length) {
      setStatus("No valid classes assigned. Check FacultyAssignments sheet headers and rows.", "err");
      debugText.textContent = "Required headers: username, sessionId, className, lectureType";
      startBtn.disabled = true;
      return;
    }

    assignments.forEach((a, i) => {
      const opt = document.createElement("option");
      opt.value = String(i);
      opt.textContent = a.className + " - " + a.lectureType + " (" + a.sessionId + ")";
      assignmentSelect.appendChild(opt);
    });

    startBtn.disabled = false;
    setStatus("Ready. Pick a class and tap Start Session.", "ok");
  } catch (e) {
    setStatus("Could not reach the server. Check Apps Script URL or deployment.", "err");
    debugText.textContent = e.message;
  }
}

startBtn.onclick = async () => {
  const chosen = assignments[Number(assignmentSelect.value)];

  if (!chosen || !chosen.sessionId || !chosen.className || !chosen.lectureType) {
    setStatus("Assignment is missing Session ID, Class Name, or Lecture Type.", "err");
    debugText.textContent = "Check FacultyAssignments row for this username.";
    startBtn.disabled = false;
    return;
  }

  startBtn.disabled = true;
  setStatus("Starting session...", "", true);
  debugText.textContent = "";

  try {
    const params = new URLSearchParams({
      action: "startSession",
      username: username,
      token: token,
      sessionId: chosen.sessionId,
      className: chosen.className,
      lectureType: chosen.lectureType
    });

    const res = await fetch(apiUrl + "?" + params.toString());
    const data = await res.json();

    if (data.ok) {
      activeSessionId = chosen.sessionId;
      selectView.style.display = "none";
      qrView.style.display = "block";
      setStatus(data.message || "Session started.", "ok");
      startQrPolling();
    } else {
      setStatus(data.message || "Could not start session.", "err");
      debugText.textContent = "Sent: " + chosen.sessionId + " / " + chosen.className + " / " + chosen.lectureType;
      startBtn.disabled = false;
    }
  } catch (e) {
    setStatus("Could not reach the server. Check your connection.", "err");
    debugText.textContent = e.message;
    startBtn.disabled = false;
  }
};

endBtn.onclick = async () => {
  if (!activeSessionId) {
    setStatus("No active session selected.", "err");
    return;
  }

  endBtn.disabled = true;
  setStatus("Ending session...", "", true);

  try {
    const params = new URLSearchParams({
      action: "endSession",
      username: username,
      token: token,
      sessionId: activeSessionId
    });

    const res = await fetch(apiUrl + "?" + params.toString());
    const data = await res.json();

    setStatus(data.message || "Session ended.", data.ok ? "ok" : "err");
  } catch (e) {
    setStatus("Could not reach the server, but QR display stopped.", "err");
    debugText.textContent = e.message;
  }

  stopQrPolling();
  activeSessionId = "";
  qrView.style.display = "none";
  selectView.style.display = "block";
  startBtn.disabled = false;
  endBtn.disabled = false;
  loadAssignments();
};

logoutBtn.onclick = () => {
  stopQrPolling();
  sessionStorage.removeItem("att_faculty_session");
  window.location.href = "login.html";
};

function startQrPolling() {
  pollQr();
  pollTimer = setInterval(pollQr, 1500);
}

function stopQrPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = null;
  lastPayload = "";
  document.getElementById("qrBox").innerHTML = "";
  document.getElementById("qrInfo").innerHTML = "";
}

async function pollQr() {
  if (!activeSessionId) return;

  try {
    const params = new URLSearchParams({
      action: "getCurrentPayload",
      sessionId: activeSessionId
    });

    const res = await fetch(apiUrl + "?" + params.toString());
    const data = await res.json();

    if (data.ok && data.active) {
      document.getElementById("qrInfo").innerHTML =
        "<b>" + data.lectureType + "</b> - " + data.className + " (" + data.sessionId + ")";

      if (data.payload !== lastPayload) {
        lastPayload = data.payload;
        const box = document.getElementById("qrBox");
        box.innerHTML = "";
        new QRCode(box, {
          text: data.payload,
          width: 260,
          height: 260,
          correctLevel: QRCode.CorrectLevel.M
        });
      }
    } else if (data.ok && !data.active) {
      setStatus("Session is no longer running.", "err");
      stopQrPolling();
      qrView.style.display = "none";
      selectView.style.display = "block";
      startBtn.disabled = false;
    }
  } catch (e) {
    // keep polling silently
  }
}

loadAssignments();
</script>
</body>
</html>
